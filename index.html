<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>草原漫步 - 交互版</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        font-family: 'Microsoft YaHei', sans-serif;
      }

      .scene {
        width: 100%;
        height: 100%;
        position: relative;
        background: linear-gradient(
          to bottom,
          #87ceeb 0%,
          #b0e0e6 30%,
          #98fb98 60%,
          #90ee90 80%,
          #228b22 100%
        );
        overflow: hidden;
      }

      /* ===== 背景元素 ===== */
      .sun {
        position: absolute;
        top: 8%;
        right: 15%;
        width: 100px;
        height: 100px;
        background: radial-gradient(
          circle,
          #ffd700 30%,
          #ffa500 70%,
          transparent 100%
        );
        border-radius: 50%;
        box-shadow: 0 0 60px rgba(255, 215, 0, 0.6);
        animation: sunPulse 4s ease-in-out infinite;
      }
      @keyframes sunPulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.05);
        }
      }

      .cloud {
        position: absolute;
        background: rgba(255, 255, 255, 0.9);
        border-radius: 100px;
      }
      .cloud::before,
      .cloud::after {
        content: '';
        position: absolute;
        background: rgba(255, 255, 255, 0.9);
        border-radius: 100px;
      }
      .cloud1 {
        width: 120px;
        height: 50px;
        top: 12%;
        left: -150px;
        animation: float 25s infinite linear;
      }
      .cloud1::before {
        width: 60px;
        height: 60px;
        top: -30px;
        left: 15px;
      }
      .cloud1::after {
        width: 70px;
        height: 50px;
        top: -20px;
        right: 15px;
      }
      @keyframes float {
        0% {
          transform: translateX(0);
        }
        100% {
          transform: translateX(calc(100vw + 300px));
        }
      }

      .mountains {
        position: absolute;
        bottom: 35%;
        left: 0;
        width: 100%;
        height: 30%;
      }
      .mountain {
        position: absolute;
        bottom: 0;
        width: 0;
        height: 0;
        border-style: solid;
      }
      .mountain1 {
        left: -5%;
        border-left: 200px solid transparent;
        border-right: 200px solid transparent;
        border-bottom: 150px solid #6b8e6b;
      }
      .mountain2 {
        left: 25%;
        border-left: 250px solid transparent;
        border-right: 250px solid transparent;
        border-bottom: 200px solid #556b55;
      }
      .mountain3 {
        left: 60%;
        border-left: 180px solid transparent;
        border-right: 180px solid transparent;
        border-bottom: 130px solid #6b8e6b;
      }
      .mountain4 {
        left: 80%;
        border-left: 220px solid transparent;
        border-right: 220px solid transparent;
        border-bottom: 170px solid #556b55;
      }

      .grass-back {
        position: absolute;
        bottom: 0;
        width: 100%;
        height: 40%;
        background: linear-gradient(to bottom, #7cb87c 0%, #5fa05f 100%);
        clip-path: polygon(
          0% 100%,
          0% 20%,
          5% 15%,
          10% 25%,
          15% 18%,
          20% 28%,
          25% 15%,
          30% 25%,
          35% 20%,
          40% 30%,
          45% 18%,
          50% 25%,
          55% 15%,
          60% 28%,
          65% 20%,
          70% 25%,
          75% 18%,
          80% 28%,
          85% 15%,
          90% 25%,
          95% 20%,
          100% 30%,
          100% 100%
        );
      }
      .grass-front {
        position: absolute;
        bottom: 0;
        width: 100%;
        height: 25%;
        background: linear-gradient(to bottom, #228b22 0%, #006400 100%);
        clip-path: polygon(
          0% 100%,
          0% 30%,
          3% 25%,
          7% 35%,
          12% 28%,
          17% 38%,
          22% 25%,
          27% 35%,
          32% 28%,
          37% 38%,
          42% 25%,
          47% 35%,
          52% 28%,
          57% 38%,
          62% 25%,
          67% 35%,
          72% 28%,
          77% 38%,
          82% 25%,
          87% 35%,
          92% 28%,
          97% 38%,
          100% 30%,
          100% 100%
        );
      }

      /* ===== 小人 ===== */
      .character {
        position: absolute;
        bottom: 15%;
        left: 50%;
        transform: translateX(-50%);
        width: 100px;
        height: 160px;
        z-index: 10;
        transition: all 0.3s ease;
      }

      /* 头部 */
      .head {
        position: absolute;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 70px;
        height: 70px;
        border-radius: 50%;
        background-image: url('./cuicui.jpg');
        background-size: cover;
        background-position: center;
        border: 3px solid #333;
        box-shadow: 0 3px 10px rgba(0, 0, 0, 0.3);
        z-index: 5;
        transition: all 0.3s ease;
      }

      /* 表情元素 - 默认隐藏 */
      .face-expression {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border-radius: 50%;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.3s;
      }
      .face-expression.active {
        opacity: 1;
      }

      /* 月牙眼 */
      .moon-eyes {
        position: absolute;
        top: 35%;
        width: 100%;
      }
      .moon-eye {
        position: absolute;
        width: 14px;
        height: 8px;
        border: 3px solid #333;
        border-top: none;
        border-radius: 0 0 14px 14px;
        background: transparent;
      }
      .moon-eye.left {
        left: 18%;
      }
      .moon-eye.right {
        right: 18%;
      }

      /* 上扬嘴 */
      .smile-mouth {
        position: absolute;
        bottom: 25%;
        left: 50%;
        transform: translateX(-50%);
        width: 25px;
        height: 12px;
        border: 3px solid #333;
        border-top: none;
        border-radius: 0 0 25px 25px;
        background: #ff6b6b;
      }

      /* 下垂嘴 */
      .sad-mouth {
        position: absolute;
        bottom: 20%;
        left: 50%;
        transform: translateX(-50%);
        width: 20px;
        height: 10px;
        border: 3px solid #333;
        border-bottom: none;
        border-radius: 25px 25px 0 0;
        background: transparent;
      }

      /* 眼泪 */
      .tear {
        position: absolute;
        top: 45%;
        width: 8px;
        height: 12px;
        background: linear-gradient(to bottom, #87ceeb, #4a90e2);
        border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
        opacity: 0;
        animation: tearDrop 1s ease-in infinite;
      }
      .tear.left {
        left: 20%;
      }
      .tear.right {
        right: 20%;
        animation-delay: 0.3s;
      }
      @keyframes tearDrop {
        0% {
          opacity: 1;
          transform: translateY(0);
        }
        100% {
          opacity: 0;
          transform: translateY(20px);
        }
      }

      /* 红印 */
      .slap-mark {
        position: absolute;
        top: 40%;
        right: 5%;
        width: 25px;
        height: 30px;
        background: radial-gradient(ellipse, rgba(255, 0, 0, 0.6), transparent);
        border-radius: 50%;
        opacity: 0;
        transform: rotate(-15deg);
      }

      /* Zzz */
      .zzz {
        position: absolute;
        top: -30px;
        right: -20px;
        font-size: 20px;
        font-weight: bold;
        color: #666;
        opacity: 0;
      }
      .zzz:nth-child(1) {
        animation: zzzFloat 2s ease-in-out infinite;
      }
      .zzz:nth-child(2) {
        animation: zzzFloat 2s ease-in-out infinite 0.6s;
      }
      .zzz:nth-child(3) {
        animation: zzzFloat 2s ease-in-out infinite 1.2s;
      }
      @keyframes zzzFloat {
        0% {
          opacity: 0;
          transform: translateY(0) translateX(0) scale(0.5);
        }
        50% {
          opacity: 1;
        }
        100% {
          opacity: 0;
          transform: translateY(-30px) translateX(10px) scale(1.2);
        }
      }

      /* 爱心 */
      .heart {
        position: absolute;
        top: -40px;
        font-size: 24px;
        color: #ff69b4;
        opacity: 0;
        animation: heartFloat 1.5s ease-out forwards;
      }
      @keyframes heartFloat {
        0% {
          opacity: 1;
          transform: translateY(0) scale(0.5);
        }
        100% {
          opacity: 0;
          transform: translateY(-50px) scale(1);
        }
      }

      /* 星星 */
      .star {
        position: absolute;
        font-size: 20px;
        color: #ffd700;
        opacity: 0;
      }
      .star:nth-child(1) {
        top: -20px;
        left: -10px;
        animation: starPop 0.8s ease-out infinite;
      }
      .star:nth-child(2) {
        top: -35px;
        left: 50%;
        animation: starPop 0.8s ease-out infinite 0.2s;
      }
      .star:nth-child(3) {
        top: -20px;
        right: -10px;
        animation: starPop 0.8s ease-out infinite 0.4s;
      }
      @keyframes starPop {
        0%,
        100% {
          opacity: 0;
          transform: scale(0) rotate(0deg);
        }
        50% {
          opacity: 1;
          transform: scale(1) rotate(180deg);
        }
      }

      /* 身体 */
      .body {
        position: absolute;
        top: 65px;
        left: 50%;
        transform: translateX(-50%);
        width: 40px;
        height: 50px;
        background: linear-gradient(to bottom, #ff6b6b 0%, #ee5a5a 100%);
        border-radius: 15px 15px 5px 5px;
        border: 2px solid #333;
        z-index: 4;
        transition: all 0.3s ease;
      }

      /* 手臂 */
      .arm {
        position: absolute;
        top: 70px;
        width: 12px;
        height: 35px;
        background: linear-gradient(to bottom, #ffd93d 0%, #f4d03f 100%);
        border-radius: 10px;
        border: 2px solid #333;
        transform-origin: top center;
        z-index: 3;
        transition: all 0.3s ease;
      }
      .arm.left {
        left: 18px;
      }
      .arm.right {
        right: 18px;
      }

      /* 腿 */
      .leg {
        position: absolute;
        top: 110px;
        width: 14px;
        height: 40px;
        background: linear-gradient(to bottom, #4a90e2 0%, #357abd 100%);
        border-radius: 10px;
        border: 2px solid #333;
        transform-origin: top center;
        z-index: 3;
        transition: all 0.3s ease;
      }
      .leg.left {
        left: 28px;
      }
      .leg.right {
        right: 28px;
      }
      .foot {
        position: absolute;
        bottom: -5px;
        left: 50%;
        transform: translateX(-50%);
        width: 18px;
        height: 10px;
        background: #333;
        border-radius: 5px 5px 0 0;
      }

      /* ===== 动作状态 ===== */

      /* 开心 */
      .character.happy {
        animation: happyShake 0.5s ease-in-out infinite;
      }
      .character.happy .body {
        animation: bodyBounce 0.5s ease-in-out infinite;
      }
      @keyframes happyShake {
        0%,
        100% {
          transform: translateX(-50%) rotate(-3deg);
        }
        50% {
          transform: translateX(-50%) rotate(3deg);
        }
      }
      @keyframes bodyBounce {
        0%,
        100% {
          transform: translateX(-50%) translateY(0);
        }
        50% {
          transform: translateX(-50%) translateY(-5px);
        }
      }

      /* 委屈 */
      .character.sad {
        transform: translateX(-50%) rotate(5deg);
      }
      .character.sad .head {
        transform: translateX(-50%) rotate(15deg) translateY(5px);
      }
      .character.sad .body {
        transform: translateX(-50%) rotate(-5deg);
      }
      .character.sad .arm.left {
        transform: rotate(45deg) translateY(10px);
      }
      .character.sad .arm.right {
        transform: rotate(-45deg) translateY(10px);
      }
      .character.sad .tear {
        opacity: 1;
      }

      /* 扇耳光 */
      .character.slap .arm.right {
        animation: slapArm 0.6s ease-out forwards;
      }
      @keyframes slapArm {
        0% {
          transform: rotate(-120deg);
        }
        50% {
          transform: rotate(10deg);
        }
        100% {
          transform: rotate(0deg);
        }
      }
      .character.slap .head {
        animation: slapHead 0.6s ease-out forwards;
      }
      @keyframes slapHead {
        0% {
          transform: translateX(-50%) rotate(0deg);
        }
        50% {
          transform: translateX(-50%) rotate(-20deg) translateX(-10px);
        }
        100% {
          transform: translateX(-50%) rotate(0deg);
        }
      }
      .character.slap .slap-mark {
        animation: slapMark 0.6s ease-out forwards;
      }
      @keyframes slapMark {
        0%,
        50% {
          opacity: 0;
        }
        60% {
          opacity: 1;
        }
        100% {
          opacity: 0.8;
        }
      }

      /* 蹦高高 */
      .character.jump {
        animation: jumpHigh 1s ease-out forwards;
      }
      @keyframes jumpHigh {
        0% {
          transform: translateX(-50%) translateY(0);
        }
        20% {
          transform: translateX(-50%) translateY(20px);
        }
        50% {
          transform: translateX(-50%) translateY(-150px);
        }
        80% {
          transform: translateX(-50%) translateY(0);
        }
        90% {
          transform: translateX(-50%) translateY(-10px);
        }
        100% {
          transform: translateX(-50%) translateY(0);
        }
      }
      .character.jump .arm.left {
        animation: jumpArm 1s ease-out forwards;
      }
      .character.jump .arm.right {
        animation: jumpArm 1s ease-out forwards;
      }
      @keyframes jumpArm {
        0%,
        20% {
          transform: rotate(-30deg);
        }
        50% {
          transform: rotate(-150deg);
        }
        80%,
        100% {
          transform: rotate(-30deg);
        }
      }
      .character.jump .leg.left {
        animation: jumpLeg 1s ease-out forwards;
      }
      .character.jump .leg.right {
        animation: jumpLeg 1s ease-out forwards;
      }
      @keyframes jumpLeg {
        0%,
        20% {
          transform: rotate(0deg);
        }
        50% {
          transform: rotate(-20deg);
        }
        80%,
        100% {
          transform: rotate(0deg);
        }
      }

      /* 睡觉 */
      .character.sleep {
        transform: translateX(-50%) rotate(90deg) translateY(30px);
        transition: transform 1s ease;
      }
      .character.sleep .head {
        transform: translateX(-50%) rotate(-90deg);
      }
      .character.sleep .zzz {
        opacity: 1;
      }
      .character.sleep .body {
        animation: breathe 2s ease-in-out infinite;
      }
      @keyframes breathe {
        0%,
        100% {
          transform: translateX(-50%) scaleY(1);
        }
        50% {
          transform: translateX(-50%) scaleY(1.05);
        }
      }

      /* 投喂 */
      .food {
        position: absolute;
        top: 20px;
        left: 50%;
        transform: translateX(-50%) scale(0);
        width: 30px;
        height: 30px;
        background: #8b4513;
        border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
        border: 2px solid #333;
        z-index: 20;
      }
      .food::before {
        content: '';
        position: absolute;
        top: 5px;
        left: 50%;
        transform: translateX(-50%);
        width: 15px;
        height: 8px;
        background: #d2691e;
        border-radius: 50%;
      }
      .character.eat .food {
        animation: foodGive 2s ease-out forwards;
      }
      @keyframes foodGive {
        0% {
          transform: translateX(-50%) scale(0) translateY(0);
        }
        30% {
          transform: translateX(-50%) scale(1) translateY(0);
        }
        60% {
          transform: translateX(-50%) scale(1) translateY(40px);
        }
        80% {
          transform: translateX(-50%) scale(0.5) translateY(50px);
          opacity: 0;
        }
        100% {
          opacity: 0;
        }
      }
      .character.eat .arm.left {
        animation: eatArm 2s ease-out forwards;
      }
      @keyframes eatArm {
        0%,
        30% {
          transform: rotate(-45deg);
        }
        60% {
          transform: rotate(-90deg);
        }
        100% {
          transform: rotate(0deg);
        }
      }
      .character.eat .head {
        animation: eatHead 2s ease-out forwards;
      }
      @keyframes eatHead {
        0%,
        50% {
          transform: translateX(-50%) rotate(0deg);
        }
        60%,
        80% {
          transform: translateX(-50%) rotate(-10deg);
        }
        100% {
          transform: translateX(-50%) rotate(0deg);
        }
      }

      /* 喝水 */
      .cup {
        position: absolute;
        top: 30px;
        left: 30%;
        transform: scale(0);
        width: 25px;
        height: 30px;
        background: linear-gradient(to bottom, #87ceeb, #4a90e2);
        border: 2px solid #333;
        border-radius: 0 0 10px 10px;
        z-index: 20;
      }
      .cup::before {
        content: '';
        position: absolute;
        top: 5px;
        right: -10px;
        width: 10px;
        height: 15px;
        border: 3px solid #333;
        border-left: none;
        border-radius: 0 10px 10px 0;
      }
      .character.drink .cup {
        animation: cupDrink 2.5s ease-out forwards;
      }
      @keyframes cupDrink {
        0% {
          transform: scale(0);
        }
        20% {
          transform: scale(1);
        }
        70% {
          transform: scale(1) rotate(-45deg) translateY(-10px);
        }
        90% {
          transform: scale(1) rotate(0deg);
        }
        100% {
          transform: scale(0);
        }
      }
      .character.drink .arm.left {
        animation: drinkArm 2.5s ease-out forwards;
      }
      @keyframes drinkArm {
        0%,
        20% {
          transform: rotate(0deg);
        }
        30%,
        70% {
          transform: rotate(-130deg);
        }
        90%,
        100% {
          transform: rotate(0deg);
        }
      }
      .character.drink .head {
        animation: drinkHead 2.5s ease-out forwards;
      }
      @keyframes drinkHead {
        0%,
        30% {
          transform: translateX(-50%) rotate(0deg);
        }
        40%,
        70% {
          transform: translateX(-50%) rotate(-30deg);
        }
        90%,
        100% {
          transform: translateX(-50%) rotate(0deg);
        }
      }
      .water-drop {
        position: absolute;
        top: 50%;
        left: 60%;
        width: 6px;
        height: 8px;
        background: #4a90e2;
        border-radius: 50%;
        opacity: 0;
      }
      .character.drink .water-drop {
        animation: waterDropAnim 2.5s ease-out forwards;
      }
      @keyframes waterDropAnim {
        0%,
        35% {
          opacity: 0;
        }
        40% {
          opacity: 1;
          transform: translateY(0);
        }
        50% {
          opacity: 1;
          transform: translateY(15px);
        }
        60%,
        100% {
          opacity: 0;
        }
      }

      /* 奔跑 */
      .character.run {
        animation: runMove 0.3s ease-in-out infinite;
      }
      @keyframes runMove {
        0%,
        100% {
          transform: translateX(-50%) translateY(0) rotate(-5deg);
        }
        50% {
          transform: translateX(-50%) translateY(-10px) rotate(5deg);
        }
      }
      .character.run .body {
        transform: translateX(-50%) rotate(25deg);
      }
      .character.run .arm.left {
        animation: runArmLeft 0.3s linear infinite;
      }
      .character.run .arm.right {
        animation: runArmRight 0.3s linear infinite;
      }
      @keyframes runArmLeft {
        0% {
          transform: rotate(-45deg);
        }
        50% {
          transform: rotate(45deg);
        }
        100% {
          transform: rotate(-45deg);
        }
      }
      @keyframes runArmRight {
        0% {
          transform: rotate(45deg);
        }
        50% {
          transform: rotate(-45deg);
        }
        100% {
          transform: rotate(45deg);
        }
      }
      .character.run .leg.left {
        animation: runLegLeft 0.3s linear infinite;
      }
      .character.run .leg.right {
        animation: runLegRight 0.3s linear infinite;
      }
      @keyframes runLegLeft {
        0% {
          transform: rotate(-40deg);
        }
        50% {
          transform: rotate(40deg);
        }
        100% {
          transform: rotate(-40deg);
        }
      }
      @keyframes runLegRight {
        0% {
          transform: rotate(40deg);
        }
        50% {
          transform: rotate(-40deg);
        }
        100% {
          transform: rotate(40deg);
        }
      }
      .dust {
        position: absolute;
        bottom: -10px;
        left: 50%;
        width: 15px;
        height: 15px;
        background: rgba(139, 119, 101, 0.6);
        border-radius: 50%;
        opacity: 0;
      }
      .character.run .dust {
        animation: dustKick 0.3s linear infinite;
      }
      @keyframes dustKick {
        0% {
          opacity: 0.8;
          transform: translateX(0) scale(1);
        }
        100% {
          opacity: 0;
          transform: translateX(-30px) scale(0.5);
        }
      }

      /* 抚摸 */
      .pet-hand {
        position: absolute;
        top: -80px;
        left: 50%;
        transform: translateX(-50%) translateY(-100px);
        width: 60px;
        height: 50px;
        background: #fdbcb4;
        border: 3px solid #333;
        border-radius: 20px 20px 40px 40px;
        z-index: 30;
        opacity: 0;
      }
      .pet-hand::before {
        content: '';
        position: absolute;
        top: -15px;
        left: 5px;
        width: 15px;
        height: 25px;
        background: #fdbcb4;
        border: 3px solid #333;
        border-radius: 15px;
        border-bottom: none;
      }
      .pet-hand::after {
        content: '';
        position: absolute;
        top: -15px;
        right: 5px;
        width: 15px;
        height: 25px;
        background: #fdbcb4;
        border: 3px solid #333;
        border-radius: 15px;
        border-bottom: none;
      }
      .character.pet .pet-hand {
        animation: petHand 2s ease-out forwards;
      }
      @keyframes petHand {
        0% {
          opacity: 1;
          transform: translateX(-50%) translateY(-100px);
        }
        30% {
          opacity: 1;
          transform: translateX(-50%) translateY(0);
        }
        70% {
          opacity: 1;
          transform: translateX(-50%) translateY(0);
        }
        100% {
          opacity: 0;
          transform: translateX(-50%) translateY(-50px);
        }
      }
      .character.pet .head {
        animation: petHead 2s ease-out forwards;
      }
      @keyframes petHead {
        0%,
        30% {
          transform: translateX(-50%) rotate(0deg);
        }
        40%,
        60% {
          transform: translateX(-50%) rotate(-10deg) translateX(-5px);
        }
        70%,
        100% {
          transform: translateX(-50%) rotate(0deg);
        }
      }

      /* 抓蝴蝶 */
      .butterfly {
        position: absolute;
        top: 20%;
        left: 80%;
        width: 30px;
        height: 30px;
        z-index: 15;
      }
      .butterfly-wing {
        position: absolute;
        width: 15px;
        height: 20px;
        background: linear-gradient(135deg, #ff6347, #ffd700, #ff69b4);
        border-radius: 50% 10% 50% 10%;
        border: 1px solid #333;
        animation: butterflyFlap 0.2s infinite alternate;
      }
      .butterfly-wing.left {
        left: 0;
        transform: rotate(-20deg);
      }
      .butterfly-wing.right {
        right: 0;
        transform: rotate(20deg) scaleX(-1);
      }
      @keyframes butterflyFlap {
        0% {
          transform: rotate(-20deg) rotateY(0deg);
        }
        100% {
          transform: rotate(-20deg) rotateY(60deg);
        }
      }
      .butterfly-body {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 4px;
        height: 20px;
        background: #333;
        border-radius: 2px;
      }
      .character.catch .butterfly {
        animation: butterflyFly 3s ease-out forwards;
      }
      @keyframes butterflyFly {
        0% {
          left: 80%;
          top: 20%;
        }
        50% {
          left: 60%;
          top: 30%;
        }
        70% {
          left: 55%;
          top: 35%;
          opacity: 1;
        }
        75% {
          opacity: 0;
        }
        100% {
          opacity: 0;
        }
      }
      .character.catch {
        animation: catchTiptoe 3s ease-out forwards;
      }
      @keyframes catchTiptoe {
        0%,
        50% {
          transform: translateX(-50%) translateY(0);
        }
        60%,
        70% {
          transform: translateX(-50%) translateY(-10px);
        }
        100% {
          transform: translateX(-50%) translateY(0);
        }
      }
      .character.catch .arm.left {
        animation: catchArm 3s ease-out forwards;
      }
      .character.catch .arm.right {
        animation: catchArm 3s ease-out forwards;
      }
      @keyframes catchArm {
        0%,
        60% {
          transform: rotate(0deg);
        }
        70% {
          transform: rotate(-100deg);
        }
        80%,
        100% {
          transform: rotate(0deg);
        }
      }
      .catch-result {
        position: absolute;
        top: -40px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 30px;
        opacity: 0;
      }
      .character.catch .catch-result {
        animation: catchResult 3s ease-out forwards;
      }
      @keyframes catchResult {
        0%,
        74% {
          opacity: 0;
          transform: translateX(-50%) scale(0);
        }
        75% {
          opacity: 1;
          transform: translateX(-50%) scale(1.2);
        }
        90% {
          opacity: 1;
          transform: translateX(-50%) scale(1);
        }
        100% {
          opacity: 0;
        }
      }

      /* ===== 按钮面板 ===== */
      .controls {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: rgba(0, 0, 0, 0.8);
        padding: 15px;
        z-index: 100;
        display: flex;
        justify-content: center;
        gap: 10px;
        flex-wrap: nowrap;
        overflow: scroll;
      }
      .btn {
        padding: 10px 18px;
        background: linear-gradient(145deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 25px;
        cursor: pointer;
        font-size: 14px;
        width: 100px;
        font-weight: bold;
        transition: all 0.2s;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      }
      .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
      }
      .btn:active {
        transform: translateY(0);
      }
      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .btn-happy {
        background: linear-gradient(145deg, #ffd93d, #f6ad55);
        color: #333;
      }
      .btn-sad {
        background: linear-gradient(145deg, #74b9ff, #0984e3);
      }
      .btn-slap {
        background: linear-gradient(145deg, #ff6b6b, #ee5a5a);
      }
      .btn-jump {
        background: linear-gradient(145deg, #a8e6cf, #7fd1b9);
        color: #333;
      }
      .btn-sleep {
        background: linear-gradient(145deg, #dda0dd, #9370db);
      }
      .btn-eat {
        background: linear-gradient(145deg, #ffdab9, #f4a460);
        color: #333;
      }
      .btn-drink {
        background: linear-gradient(145deg, #87ceeb, #4a90e2);
      }
      .btn-run {
        background: linear-gradient(145deg, #ffaa7f, #ff7f50);
      }
      .btn-pet {
        background: linear-gradient(145deg, #ffb6c1, #ff69b4);
      }
      .btn-catch {
        background: linear-gradient(145deg, #98d8c8, #5fb3b3);
      }
    </style>
  </head>
  <body>
    <div class="scene">
      <div class="sun"></div>
      <div class="cloud cloud1"></div>
      <div class="mountains">
        <div class="mountain mountain1"></div>
        <div class="mountain mountain2"></div>
        <div class="mountain mountain3"></div>
        <div class="mountain mountain4"></div>
      </div>
      <div class="grass-back"></div>
      <div class="grass-front"></div>

      <!-- 小人 -->
      <div class="character" id="character">
        <!-- 抚摸的手 -->
        <div class="pet-hand"></div>

        <!-- 头部 -->
        <div class="head">
          <!-- 开心表情 -->
          <div class="face-expression happy-face">
            <div class="moon-eyes">
              <div class="moon-eye left"></div>
              <div class="moon-eye right"></div>
            </div>
            <div class="smile-mouth"></div>
            <div class="star">⭐</div>
            <div class="star">✨</div>
            <div class="star">⭐</div>
          </div>

          <!-- 委屈表情 -->
          <div class="face-expression sad-face">
            <div class="tear left"></div>
            <div class="tear right"></div>
            <div class="sad-mouth"></div>
          </div>

          <!-- 红印 -->
          <div class="face-expression slap-face">
            <div class="slap-mark"></div>
          </div>

          <!-- Zzz -->
          <div class="zzz">Z</div>
          <div class="zzz">z</div>
          <div class="zzz">z</div>
        </div>

        <!-- 身体 -->
        <div class="body"></div>

        <!-- 手臂 -->
        <div class="arm left"></div>
        <div class="arm right"></div>

        <!-- 腿 -->
        <div class="leg left"><div class="foot"></div></div>
        <div class="leg right"><div class="foot"></div></div>

        <!-- 食物 -->
        <div class="food"></div>

        <!-- 杯子 -->
        <div class="cup">
          <div class="water-drop"></div>
        </div>

        <!-- 尘土 -->
        <div class="dust"></div>

        <!-- 蝴蝶 -->
        <div class="butterfly">
          <div class="butterfly-wing left"></div>
          <div class="butterfly-body"></div>
          <div class="butterfly-wing right"></div>
        </div>

        <!-- 抓蝴蝶结果 -->
        <div class="catch-result">🦋</div>
      </div>
    </div>

    <!-- 控制按钮 -->
    <div class="controls">
      <button class="btn btn-happy" onclick="doAction('happy')">😊 开心</button>
      <button class="btn btn-sad" onclick="doAction('sad')">😢 委屈</button>
      <button class="btn btn-slap" onclick="doAction('slap')">👋 扇耳光</button>
      <button class="btn btn-jump" onclick="doAction('jump')">⬆️ 蹦高高</button>
      <button class="btn btn-sleep" onclick="doAction('sleep')">😴 睡觉</button>
      <button class="btn btn-eat" onclick="doAction('eat')">🍞 投喂</button>
      <button class="btn btn-drink" onclick="doAction('drink')">🥤 喝水</button>
      <button class="btn btn-run" onclick="doAction('run')">🏃 奔跑</button>
      <button class="btn btn-pet" onclick="doAction('pet')">🖐️ 抚摸</button>
      <button class="btn btn-catch" onclick="doAction('catch')">
        🦋 抓蝴蝶
      </button>
    </div>

    <script>
      const character = document.getElementById('character')
      const buttons = document.querySelectorAll('.btn')
      let currentAction = null

      function disableButtons() {
        buttons.forEach((btn) => (btn.disabled = true))
      }

      function enableButtons() {
        buttons.forEach((btn) => (btn.disabled = false))
      }

      function resetCharacter() {
        character.className = 'character'
        document
          .querySelectorAll('.face-expression')
          .forEach((f) => f.classList.remove('active'))
        document.querySelectorAll('.heart').forEach((h) => h.remove())
      }

      function doAction(action) {
        if (currentAction) return
        currentAction = action
        disableButtons()
        resetCharacter()

        // 随机决定是否抓到蝴蝶
        if (action === 'catch') {
          const caught = Math.random() > 0.5
          document.querySelector('.catch-result').textContent = caught
            ? '🦋'
            : '💨'
        }

        character.classList.add(action)

        // 显示对应的表情
        if (action === 'happy') {
          document.querySelector('.happy-face').classList.add('active')
          // 随机位置生成爱心
          for (let i = 0; i < 5; i++) {
            setTimeout(() => {
              const heart = document.createElement('div')
              heart.className = 'heart'
              heart.textContent = '❤️'
              heart.style.left = 30 + Math.random() * 40 + '%'
              heart.style.top = -30 - Math.random() * 20 + 'px'
              character.querySelector('.head').appendChild(heart)
            }, i * 200)
          }
        } else if (action === 'sad') {
          document.querySelector('.sad-face').classList.add('active')
        } else if (action === 'slap') {
          document.querySelector('.slap-face').classList.add('active')
        }

        // 动作持续时间
        const duration =
          {
            happy: 2000,
            sad: 2500,
            slap: 1500,
            jump: 1500,
            sleep: 3000,
            eat: 2500,
            drink: 2800,
            run: 2000,
            pet: 2500,
            catch: 3500,
          }[action] || 2000

        setTimeout(() => {
          resetCharacter()
          currentAction = null
          enableButtons()
        }, duration)
      }
    </script>
  </body>
</html>

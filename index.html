<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>翠翠格斗</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            overflow: hidden;
        }
        
        #gameContainer {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* 标题 */
        .game-title {
            text-align: center;
            font-size: 48px;
            font-weight: bold;
            background: linear-gradient(45deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 3s ease infinite;
            text-shadow: 0 0 30px rgba(255,255,255,0.3);
            margin-bottom: 20px;
        }
        
        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        /* 血条区域 */
        .health-bars {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 0 50px;
        }
        
        .health-bar-container {
            width: 400px;
        }
        
        .player-name {
            color: #fff;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        .health-bar {
            width: 100%;
            height: 30px;
            background: #333;
            border-radius: 15px;
            overflow: hidden;
            border: 3px solid #fff;
            box-shadow: 0 0 20px rgba(255,255,255,0.3);
        }
        
        .health-fill {
            height: 100%;
            transition: width 0.3s ease;
            border-radius: 12px;
        }
        
        .player1-health {
            background: linear-gradient(90deg, #00b894, #00cec9);
        }
        
        .player2-health {
            background: linear-gradient(90deg, #e74c3c, #c0392b);
        }
        
        .vs-text {
            font-size: 36px;
            font-weight: bold;
            color: #feca57;
            text-shadow: 0 0 20px #feca57;
        }
        
        /* 游戏区域 */
        .game-area {
            position: relative;
            width: 100%;
            height: 500px;
            background: linear-gradient(180deg, #2c3e50 0%, #34495e 100%);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }
        
        .ground {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 80px;
            background: linear-gradient(180deg, #7f8c8d 0%, #2c3e50 100%);
            border-top: 5px solid #95a5a6;
        }
        
        /* 角色 */
        .character {
            position: absolute;
            bottom: 80px;
            width: 120px;
            height: 200px;
            transition: transform 0.1s ease;
        }
        
        .player1 {
            left: 150px;
        }
        
        .player2 {
            right: 150px;
            transform: scaleX(-1);
        }
        
        /* 角色头部 */
        .character-head {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto;
            border: 4px solid #fff;
            box-shadow: 0 0 20px rgba(255,255,255,0.5);
            overflow: hidden;
            position: relative;
        }
        
        .player1 .character-head {
            background: url('cuicui.jpg') center/cover;
        }
        
        .player2 .character-head {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .player2 .character-head::after {
            content: '嘉';
            font-size: 40px;
            font-weight: bold;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        /* 身体 */
        .character-body {
            width: 60px;
            height: 80px;
            margin: 5px auto;
            border-radius: 10px;
            position: relative;
        }
        
        .player1 .character-body {
            background: linear-gradient(180deg, #3498db, #2980b9);
        }
        
        .player2 .character-body {
            background: linear-gradient(180deg, #e74c3c, #c0392b);
        }
        
        /* 手臂 */
        .arm {
            position: absolute;
            width: 50px;
            height: 15px;
            background: #f1c40f;
            border-radius: 10px;
            top: 20px;
            transition: transform 0.1s ease;
        }
        
        .arm.left {
            left: -40px;
            transform-origin: right center;
        }
        
        .arm.right {
            right: -40px;
            transform-origin: left center;
        }
        
        /* 腿 */
        .leg {
            position: absolute;
            width: 20px;
            height: 60px;
            background: #2c3e50;
            border-radius: 10px;
            bottom: -50px;
            transition: transform 0.1s ease;
        }
        
        .leg.left {
            left: 10px;
        }
        
        .leg.right {
            right: 10px;
        }
        
        /* 攻击动画 */
        .punching .arm.right {
            animation: punch 0.2s ease;
        }
        
        .kicking .leg.right {
            animation: kick 0.3s ease;
        }
        
        .throwing {
            animation: throw 0.5s ease;
        }
        
        @keyframes punch {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(-90deg) translateX(30px); }
        }
        
        @keyframes kick {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(-45deg) translateX(40px) translateY(-20px); }
        }
        
        @keyframes throw {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(50px) rotate(10deg); }
        }
        
        /* 受击动画 */
        .hit {
            animation: hitShake 0.3s ease;
        }
        
        @keyframes hitShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px) rotate(-5deg); }
            75% { transform: translateX(10px) rotate(5deg); }
        }
        
        /* 跳跃 */
        .jumping {
            animation: jump 0.5s ease;
        }
        
        @keyframes jump {
            0%, 100% { bottom: 80px; }
            50% { bottom: 250px; }
        }
        
        /* 蹲下 */
        .crouching {
            transform: scaleY(0.6) translateY(80px);
        }
        
        /* 特效 */
        .effect {
            position: absolute;
            pointer-events: none;
            animation: effectFade 0.5s ease forwards;
        }
        
        @keyframes effectFade {
            0% { opacity: 1; transform: scale(0.5); }
            100% { opacity: 0; transform: scale(1.5); }
        }
        
        /* 击打特效 - 基础 */
        .hit-effect-1 {
            width: 60px;
            height: 60px;
            background: radial-gradient(circle, #fff 0%, #ff6b6b 50%, transparent 70%);
            border-radius: 50%;
        }
        
        /* 击打特效 - 中级 */
        .hit-effect-2 {
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, #fff 0%, #feca57 30%, #ff6b6b 60%, transparent 70%);
            border-radius: 50%;
            box-shadow: 0 0 30px #feca57;
        }
        
        .hit-effect-2::before,
        .hit-effect-2::after {
            content: '💥';
            position: absolute;
            font-size: 30px;
        }
        
        .hit-effect-2::before {
            top: -20px;
            left: -10px;
        }
        
        .hit-effect-2::after {
            bottom: -20px;
            right: -10px;
        }
        
        /* 击打特效 - 高级 */
        .hit-effect-3 {
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, #fff 0%, #48dbfb 20%, #feca57 40%, #ff6b6b 60%, transparent 70%);
            border-radius: 50%;
            box-shadow: 0 0 50px #ff6b6b, 0 0 100px #feca57;
        }
        
        .hit-effect-3::before {
            content: '💥💥💥';
            position: absolute;
            font-size: 40px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        
        /* 击打特效 - 终极 */
        .hit-effect-4 {
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, #fff 0%, #ff9ff3 10%, #48dbfb 25%, #feca57 40%, #ff6b6b 55%, #5f27cd 70%, transparent 80%);
            border-radius: 50%;
            box-shadow: 0 0 80px #ff6b6b, 0 0 120px #feca57, 0 0 160px #48dbfb;
        }
        
        .hit-effect-4::before {
            content: '🔥🔥🔥';
            position: absolute;
            font-size: 50px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        
        .hit-effect-4::after {
            content: '⚡BOSS⚡';
            position: absolute;
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 10px #000;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        
        /* 连击数显示 */
        .combo-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            color: #feca57;
            text-shadow: 0 0 20px #feca57;
            opacity: 0;
            animation: comboPop 0.5s ease forwards;
            z-index: 100;
        }
        
        @keyframes comboPop {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1) translateY(-50px); }
        }
        
        /* 伤害数字 */
        .damage-text {
            position: absolute;
            font-size: 32px;
            font-weight: bold;
            color: #e74c3c;
            text-shadow: 2px 2px 4px #000;
            animation: damageFloat 1s ease forwards;
            z-index: 100;
        }
        
        @keyframes damageFloat {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-100px); }
        }
        
        /* 控制面板 */
        .controls {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .control-group {
            background: rgba(255,255,255,0.1);
            padding: 15px 25px;
            border-radius: 15px;
            border: 2px solid rgba(255,255,255,0.2);
        }
        
        .control-title {
            color: #fff;
            font-size: 16px;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .keys {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .key {
            width: 50px;
            height: 50px;
            background: linear-gradient(180deg, #ecf0f1 0%, #bdc3c7 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            color: #2c3e50;
            box-shadow: 0 5px 0 #7f8c8d;
            cursor: pointer;
            user-select: none;
        }
        
        .key:active {
            transform: translateY(5px);
            box-shadow: 0 0 0 #7f8c8d;
        }
        
        /* 开始/结束界面 */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .overlay.hidden {
            display: none;
        }
        
        .overlay-title {
            font-size: 64px;
            font-weight: bold;
            background: linear-gradient(45deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 30px;
            animation: gradientShift 2s ease infinite;
        }
        
        .overlay-subtitle {
            font-size: 24px;
            color: #fff;
            margin-bottom: 40px;
            text-align: center;
            line-height: 1.6;
        }
        
        .btn {
            padding: 20px 60px;
            font-size: 28px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }
        
        .btn-start {
            background: linear-gradient(45deg, #00b894, #00cec9);
            color: #fff;
            box-shadow: 0 0 30px rgba(0,206,201,0.5);
        }
        
        .btn-start:hover {
            transform: scale(1.1);
            box-shadow: 0 0 50px rgba(0,206,201,0.8);
        }
        
        .btn-restart {
            background: linear-gradient(45deg, #e74c3c, #c0392b);
            color: #fff;
            box-shadow: 0 0 30px rgba(231,76,60,0.5);
        }
        
        .btn-restart:hover {
            transform: scale(1.1);
            box-shadow: 0 0 50px rgba(231,76,60,0.8);
        }
        
        /* 击打次数显示 */
        .hit-counter {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            padding: 10px 30px;
            border-radius: 30px;
            border: 2px solid #feca57;
        }
        
        .hit-counter-text {
            color: #feca57;
            font-size: 24px;
            font-weight: bold;
        }
        
        /* 粒子效果 */
        .particle {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            pointer-events: none;
        }
        
        /* 波动效果 */
        .shockwave {
            position: absolute;
            border: 3px solid rgba(255,255,255,0.8);
            border-radius: 50%;
            animation: shockwave 0.6s ease forwards;
            pointer-events: none;
        }
        
        @keyframes shockwave {
            0% { width: 0; height: 0; opacity: 1; }
            100% { width: 300px; height: 300px; opacity: 0; }
        }
        
        /* 击中闪光 */
        .flash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.3);
            pointer-events: none;
            animation: flash 0.1s ease forwards;
        }
        
        @keyframes flash {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <h1 class="game-title">🥊 翠翠格斗 - 嘉人挑战 🥊</h1>
        
        <!-- 血条 -->
        <div class="health-bars">
            <div class="health-bar-container">
                <div class="player-name">👤 翠翠 (玩家)</div>
                <div class="health-bar">
                    <div class="health-fill player1-health" id="player1Health" style="width: 100%"></div>
                </div>
            </div>
            <div class="vs-text">VS</div>
            <div class="health-bar-container">
                <div class="player-name" style="text-align: right;">嘉人 (敌人) 👹</div>
                <div class="health-bar">
                    <div class="health-fill player2-health" id="player2Health" style="width: 100%"></div>
                </div>
            </div>
        </div>
        
        <!-- 游戏区域 -->
        <div class="game-area" id="gameArea">
            <div class="hit-counter">
                <span class="hit-counter-text">击打次数: <span id="hitCount">0</span> / 100</span>
            </div>
            
            <!-- 角色1 - 翠翠 -->
            <div class="character player1" id="player1">
                <div class="character-head"></div>
                <div class="character-body">
                    <div class="arm left"></div>
                    <div class="arm right"></div>
                    <div class="leg left"></div>
                    <div class="leg right"></div>
                </div>
            </div>
            
            <!-- 角色2 - 嘉人 -->
            <div class="character player2" id="player2">
                <div class="character-head"></div>
                <div class="character-body">
                    <div class="arm left"></div>
                    <div class="arm right"></div>
                    <div class="leg left"></div>
                    <div class="leg right"></div>
                </div>
            </div>
            
            <div class="ground"></div>
        </div>
        
        <!-- 控制说明 -->
        <div class="controls">
            <div class="control-group">
                <div class="control-title">🎮 移动</div>
                <div class="keys">
                    <div class="key">←</div>
                    <div class="key">→</div>
                    <div class="key">↑</div>
                    <div class="key">↓</div>
                </div>
            </div>
            <div class="control-group">
                <div class="control-title">👊 攻击</div>
                <div class="keys">
                    <div class="key">A</div>
                    <div class="key">S</div>
                    <div class="key">D</div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 开始界面 -->
    <div class="overlay" id="startScreen">
        <h1 class="overlay-title">🥊 翠翠格斗 🥊</h1>
        <p class="overlay-subtitle">
            击败嘉人！需要击打 100 次才能获胜！<br>
            击打越多，特效越炫酷！
        </p>
        <button class="btn btn-start" onclick="startGame()">开始游戏</button>
    </div>
    
    <!-- 游戏结束界面 -->
    <div class="overlay hidden" id="gameOverScreen">
        <h1 class="overlay-title" id="winnerText">🎉 胜利！</h1>
        <p class="overlay-subtitle" id="gameOverSubtitle">
            你成功击败了嘉人！<br>
            总击打次数: <span id="finalHits">0</span>
        </p>
        <button class="btn btn-restart" onclick="restartGame()">再来一局</button>
    </div>

    <script>
        // 游戏状态
        let gameState = {
            isPlaying: false,
            player1Health: 100,
            player2Health: 100,
            hitCount: 0,
            targetHits: 100,
            combo: 0,
            lastHitTime: 0,
            player1Pos: { x: 150, y: 80 },
            player2Pos: { x: 930, y: 80 },
            isJumping: false,
            isCrouching: false
        };
        
        // DOM 元素
        const player1 = document.getElementById('player1');
        const player2 = document.getElementById('player2');
        const player1Health = document.getElementById('player1Health');
        const player2Health = document.getElementById('player2Health');
        const hitCountEl = document.getElementById('hitCount');
        const gameArea = document.getElementById('gameArea');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const winnerText = document.getElementById('winnerText');
        const gameOverSubtitle = document.getElementById('gameOverSubtitle');
        const finalHits = document.getElementById('finalHits');
        
        // 按键状态
        const keys = {};
        
        // 开始游戏
        function startGame() {
            gameState.isPlaying = true;
            gameState.player1Health = 100;
            gameState.player2Health = 100;
            gameState.hitCount = 0;
            gameState.combo = 0;
            gameState.player1Pos = { x: 150, y: 80 };
            
            updateHealthBars();
            updateHitCount();
            
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            
            // 重置位置
            player1.style.left = gameState.player1Pos.x + 'px';
            player1.classList.remove('jumping', 'crouching');
            
            // 启动敌人AI
            startEnemyAI();
        }
        
        // 重新开始
        function restartGame() {
            startGame();
        }
        
        // 更新血条
        function updateHealthBars() {
            player1Health.style.width = gameState.player1Health + '%';
            player2Health.style.width = gameState.player2Health + '%';
        }
        
        // 更新击打次数
        function updateHitCount() {
            hitCountEl.textContent = gameState.hitCount;
        }
        
        // 创建特效
        function createHitEffect(x, y, level) {
            const effect = document.createElement('div');
            effect.className = `effect hit-effect-${level}`;
            effect.style.left = x + 'px';
            effect.style.top = y + 'px';
            gameArea.appendChild(effect);
            
            setTimeout(() => effect.remove(), 500);
        }
        
        // 创建伤害数字
        function createDamageText(x, y, damage) {
            const text = document.createElement('div');
            text.className = 'damage-text';
            text.textContent = '-' + damage;
            text.style.left = x + 'px';
            text.style.top = y + 'px';
            gameArea.appendChild(text);
            
            setTimeout(() => text.remove(), 1000);
        }
        
        // 创建连击显示
        function createComboDisplay(combo) {
            const display = document.createElement('div');
            display.className = 'combo-display';
            display.textContent = combo + ' 连击!';
            gameArea.appendChild(display);
            
            setTimeout(() => display.remove(), 500);
        }
        
        // 创建粒子效果
        function createParticles(x, y, count, colors) {
            for (let i = 0; i < count; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                
                const angle = (Math.PI * 2 * i) / count;
                const velocity = 50 + Math.random() * 100;
                const tx = Math.cos(angle) * velocity;
                const ty = Math.sin(angle) * velocity;
                
                particle.style.animation = `none`;
                particle.style.transition = 'all 0.5s ease';
                
                gameArea.appendChild(particle);
                
                requestAnimationFrame(() => {
                    particle.style.transform = `translate(${tx}px, ${ty}px)`;
                    particle.style.opacity = '0';
                });
                
                setTimeout(() => particle.remove(), 500);
            }
        }
        
        // 创建冲击波
        function createShockwave(x, y) {
            const wave = document.createElement('div');
            wave.className = 'shockwave';
            wave.style.left = x + 'px';
            wave.style.top = y + 'px';
            gameArea.appendChild(wave);
            
            setTimeout(() => wave.remove(), 600);
        }
        
        // 创建闪光
        function createFlash() {
            const flash = document.createElement('div');
            flash.className = 'flash';
            gameArea.appendChild(flash);
            
            setTimeout(() => flash.remove(), 100);
        }
        
        // 根据击打次数获取特效等级
        function getEffectLevel() {
            const hits = gameState.hitCount;
            if (hits < 20) return 1;
            if (hits < 50) return 2;
            if (hits < 80) return 3;
            return 4;
        }
        
        // 攻击
        function attack(type) {
            if (!gameState.isPlaying) return;
            
            // 检查距离
            const distance = Math.abs(gameState.player1Pos.x - gameState.player2Pos.x);
            if (distance > 300) return;
            
            // 播放攻击动画
            player1.classList.add(type + 'ing');
            setTimeout(() => player1.classList.remove(type + 'ing'), 500);
            
            // 计算伤害
            let damage = 1;
            let hitX = gameState.player2Pos.x + 60;
            let hitY = 200;
            
            if (type === 'punch') {
                damage = 1;
            } else if (type === 'kick') {
                damage = 2;
            } else if (type === 'throw') {
                damage = 3;
            }
            
            // 应用伤害
            gameState.hitCount += damage;
            gameState.player2Health = Math.max(0, 100 - gameState.hitCount);
            
            // 连击系统
            const now = Date.now();
            if (now - gameState.lastHitTime < 1000) {
                gameState.combo++;
                if (gameState.combo > 2) {
                    createComboDisplay(gameState.combo);
                }
            } else {
                gameState.combo = 1;
            }
            gameState.lastHitTime = now;
            
            // 创建特效
            const effectLevel = getEffectLevel();
            createHitEffect(hitX - 30, hitY - 30, effectLevel);
            createDamageText(hitX, hitY - 50, damage);
            
            // 高级特效
            if (effectLevel >= 2) {
                const colors = ['#ff6b6b', '#feca57', '#48dbfb'];
                createParticles(hitX, hitY, 10 * effectLevel, colors);
            }
            
            if (effectLevel >= 3) {
                createShockwave(hitX, hitY);
            }
            
            if (effectLevel >= 4) {
                createFlash();
            }
            
            // 受击动画
            player2.classList.add('hit');
            setTimeout(() => player2.classList.remove('hit'), 300);
            
            // 更新UI
            updateHealthBars();
            updateHitCount();
            
            // 检查游戏结束
            if (gameState.hitCount >= gameState.targetHits) {
                endGame(true);
            }
        }
        
        // 移动
        function movePlayer(direction) {
            if (!gameState.isPlaying) return;
            if (gameState.isJumping) return;
            
            const speed = 20;
            const minX = 50;
            const maxX = 800;
            
            if (direction === 'left') {
                gameState.player1Pos.x = Math.max(minX, gameState.player1Pos.x - speed);
                player1.style.transform = 'scaleX(-1)';
            } else if (direction === 'right') {
                gameState.player1Pos.x = Math.min(maxX, gameState.player1Pos.x + speed);
                player1.style.transform = 'scaleX(1)';
            }
            
            player1.style.left = gameState.player1Pos.x + 'px';
        }
        
        // 跳跃
        function jump() {
            if (!gameState.isPlaying || gameState.isJumping || gameState.isCrouching) return;
            
            gameState.isJumping = true;
            player1.classList.add('jumping');
            
            setTimeout(() => {
                player1.classList.remove('jumping');
                gameState.isJumping = false;
            }, 500);
        }
        
        // 蹲下
        function crouch(active) {
            if (!gameState.isPlaying || gameState.isJumping) return;
            
            gameState.isCrouching = active;
            if (active) {
                player1.classList.add('crouching');
            } else {
                player1.classList.remove('crouching');
            }
        }
        
        // 敌人AI
        function startEnemyAI() {
            if (!gameState.isPlaying) return;
            
            // 敌人移动
            const moveInterval = setInterval(() => {
                if (!gameState.isPlaying) {
                    clearInterval(moveInterval);
                    return;
                }
                
                // 向玩家移动
                if (gameState.player2Pos.x > gameState.player1Pos.x + 200) {
                    gameState.player2Pos.x -= 5;
                } else if (gameState.player2Pos.x < gameState.player1Pos.x - 200) {
                    gameState.player2Pos.x += 5;
                }
                
                player2.style.right = (1200 - gameState.player2Pos.x - 120) + 'px';
                
                // 随机攻击
                if (Math.random() < 0.02 && Math.abs(gameState.player2Pos.x - gameState.player1Pos.x) < 250) {
                    enemyAttack();
                }
            }, 50);
        }
        
        // 敌人攻击
        function enemyAttack() {
            player2.classList.add('punching');
            setTimeout(() => player2.classList.remove('punching'), 200);
            
            // 玩家受伤
            if (!gameState.isCrouching && !gameState.isJumping) {
                gameState.player1Health = Math.max(0, gameState.player1Health - 5);
                updateHealthBars();
                
                player1.classList.add('hit');
                setTimeout(() => player1.classList.remove('hit'), 300);
                
                // 创建小特效
                createHitEffect(gameState.player1Pos.x + 60, 200, 1);
                
                if (gameState.player1Health <= 0) {
                    endGame(false);
                }
            }
        }
        
        // 游戏结束
        function endGame(playerWon) {
            gameState.isPlaying = false;
            
            setTimeout(() => {
                if (playerWon) {
                    winnerText.textContent = '🎉 胜利！';
                    winnerText.style.background = 'linear-gradient(45deg, #00b894, #00cec9)';
                    winnerText.style.webkitBackgroundClip = 'text';
                    gameOverSubtitle.innerHTML = `你成功击败了嘉人！<br>总击打次数: ${gameState.hitCount}`;
                } else {
                    winnerText.textContent = '💀 失败';
                    winnerText.style.background = 'linear-gradient(45deg, #e74c3c, #c0392b)';
                    winnerText.style.webkitBackgroundClip = 'text';
                    gameOverSubtitle.innerHTML = `你被嘉人击败了！<br>总击打次数: ${gameState.hitCount}`;
                }
                
                finalHits.textContent = gameState.hitCount;
                gameOverScreen.classList.remove('hidden');
            }, 500);
        }
        
        // 键盘事件
        document.addEventListener('keydown', (e) => {
            if (!gameState.isPlaying) return;
            
            keys[e.key] = true;
            
            switch(e.key) {
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    movePlayer('left');
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    movePlayer('right');
                    break;
                case 'ArrowUp':
                case 'w':
                case 'W':
                    jump();
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    crouch(true);
                    break;
            }
            
            // 攻击
            if (e.key === 'a' || e.key === 'A') {
                if (!e.repeat) attack('punch');
            }
            if (e.key === 's' || e.key === 'S') {
                if (!e.repeat) attack('kick');
            }
            if (e.key === 'd' || e.key === 'D') {
                if (!e.repeat) attack('throw');
            }
        });
        
        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
            
            if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') {
                crouch(false);
            }
        });
        
        // 防止方向键滚动页面
        window.addEventListener('keydown', (e) => {
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
